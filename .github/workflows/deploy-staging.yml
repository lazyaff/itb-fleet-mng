name: Deploy Fleet Management (Staging)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_AUTH_USERNAME: ${{ secrets.NEXT_PUBLIC_AUTH_USERNAME }}
          NEXT_PUBLIC_AUTH_PASSWORD: ${{ secrets.NEXT_PUBLIC_AUTH_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AZURE_AD_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          port: 22
          username: root
          password: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/komuto-fleet-management || exit 1
            git pull origin dev
            npm ci
            npx prisma migrate deploy || echo "Migration skipped"
            npm run build
            pm2 restart komuto-fleet || pm2 start npm --name komuto-fleet -- start

      - name: Verify deployment
        run: curl -f http://${{ secrets.HOST }}:3003/health || echo "Health check skipped"